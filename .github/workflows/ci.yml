name: MLflow CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |

          pip install mlflow
          pip install dagshub
          pip install tensorflow
          pip install matplotlib
          pip install scikit-learn
          pip install pillow

      - name: Configure DagsHub
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "DagsHub configured"

      - name: Run MLflow Project
        run: |

          cd MLProject

          mlflow run .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts

          path: |
            MLProject/artifacts/*.png
            MLProject/artifacts/*.txt
            MLProject/artifacts/*.keras

      - name: Build Docker Image
        run: |

          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/intel-image-classification:latest \
          ./MLProject

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/intel-image-classification:latest
