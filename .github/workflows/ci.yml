# =========================================================
# .github/workflows/ci.yml
# =========================================================

name: MLflow CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      # ===================================================
      # Checkout Repository
      # ===================================================

      - name: Checkout Repository

        uses: actions/checkout@v4

      # ===================================================
      # Setup Python
      # ===================================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.10"

      # ===================================================
      # Install Dependencies
      # ===================================================

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r MLProject/requirements.txt

      # ===================================================
      # Run MLflow Project
      # ===================================================

      - name: Run MLflow Project

        run: |

          cd MLProject

          python modelling.py

      # ===================================================
      # Upload Artifacts
      # ===================================================

      - name: Upload Artifacts

        uses: actions/upload-artifact@v4

        with:
          name: model-artifacts

          path: MLProject/artifacts/

      # ===================================================
      # Build Docker Image
      # ===================================================

      - name: Build Docker Image

        run: |

          cd MLProject

          docker build -t intel-image-classification .

      # ===================================================
      # Login Docker Hub
      # ===================================================

      - name: Login Docker Hub

        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}

          password: ${{ secrets.DOCKER_PASSWORD }}

      # ===================================================
      # Push Docker Image
      # ===================================================

      - name: Push Docker Image

        run: |

          docker tag intel-image-classification ${{ secrets.DOCKER_USERNAME }}/intel-image-classification:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/intel-image-classification:latest
