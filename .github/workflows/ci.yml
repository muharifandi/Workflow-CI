# =========================================================
# .github/workflows/ci.yml
# =========================================================
name: MLflow CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      # ===================================================
      # Set up job
      # ===================================================
      - name: Set up job
        run: echo "Starting CI Pipeline"

      # ===================================================
      # Checkout Repository
      # ===================================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ===================================================
      # Setup Python
      # ===================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ===================================================
      # Check Environment
      # ===================================================
      - name: Check Environment
        run: |
          python --version
          pip --version

      # ===================================================
      # Install Dependencies
      # ===================================================
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow
          pip install -r MLProject/requirements.txt

      # ===================================================
      # Run MLflow Project
      # ===================================================
      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      # ===================================================
      # Upload Artifacts
      # ===================================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/artifacts/

      # ===================================================
      # Login Docker Hub
      # ===================================================
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ===================================================
      # Build Docker Image with MLflow
      # ===================================================
      - name: Build Docker Image with MLflow
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          echo "Using Run ID: $RUN_ID"
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "${{ secrets.DOCKER_USERNAME }}/intel-image-classification" \
            --env-manager local

      # ===================================================
      # Push Docker Image
      # ===================================================
      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/intel-image-classification:latest

      # ===================================================
      # Complete Job
      # ===================================================
      - name: Complete Job
        run: echo "CI Pipeline Completed Successfully"
